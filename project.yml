name: HubPlus
options:
  bundleIdPrefix: com.hubplus
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  HubPlus:
    type: application
    platform: macOS
    sources:
      - path: HubPlus
    info:
      path: HubPlus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Hub+
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Regular app: shows a Dock icon so it's clearly "running" and re-openable.
        LSUIElement: false
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: "Hub+ focuses the terminal window of the agent you tap."
    entitlements:
      path: HubPlus/Resources/HubPlus.entitlements
      properties:
        # Not sandboxed: must read ~/.claude, run git in repos, spawn `claude`,
        # and read the Claude Code keychain item. Same posture as AgentHub.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hubplus.app
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: HubPlus/Resources/HubPlus.entitlements
  HubPlusTests:
    type: bundle.unit-test
    platform: macOS
    sources: [HubPlusTests]
    dependencies:
      - target: HubPlus
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  HubPlus:
    build:
      targets:
        HubPlus: all
    test:
      targets: [HubPlusTests]
      gatherCoverageData: true
