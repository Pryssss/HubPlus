name: HubPlus
options:
  bundleIdPrefix: com.hubplus
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  HubPlus:
    type: application
    platform: macOS
    sources:
      - path: HubPlus
    info:
      path: HubPlus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Hub+
        # Regular app: shows a Dock icon so it's clearly "running" and re-openable.
        LSUIElement: false
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
    entitlements:
      path: HubPlus/Resources/HubPlus.entitlements
      properties:
        # Not sandboxed: must read ~/.claude, run git in repos, spawn `claude`,
        # and read the Claude Code keychain item. Same posture as AgentHub.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hubplus.app
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: HubPlus/Resources/HubPlus.entitlements
